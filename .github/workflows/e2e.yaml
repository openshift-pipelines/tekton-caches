name: Test Tekton-Cache on Kind
on:
  pull_request:
    branches: [main, "release-v*"]
  push:
    branches:
      - main
      - release-v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e tests
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /home/runner/.kube/config.kind
      # Docker is the supported path for kind on GitHub-hosted runners; Podman's
      # experimental kind provider often hits kubelet/cgroup issues (kubelet 10248 timeouts).
      CONTAINER_TOOL: docker
    steps:
      - uses: ko-build/setup-ko@v0.9
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
      - uses: azure/setup-helm@v4
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.22"

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          limit-access-to-actor: true
          detached: true

      - name: Install kind
        run: |
          set -euxfo pipefail
          ./hack/kind-install.sh

      - uses: tektoncd/actions/setup-tektoncd@main
        with:
          pipeline_version: latest
          feature_flags: '{"enable-step-actions": "true"}'
          setup_registry: false
      - name: tests
        run: |
          set -euxfo pipefail

          REGISTRY=registry.registry.svc.cluster.local:32222
          KO_DOCKER_REPO=localhost:5000/tekton-caches
          IMAGE_REF="${KO_DOCKER_REPO}/cache:$(git rev-parse HEAD | tr -d '\n')"

          #FIXME Disabling e2e as there seems to be some issue
          #make e2e