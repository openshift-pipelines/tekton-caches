permissions:
  contents: read

on:
  pull_request:
    branches: [main, "release-v*"]
  push:
    branches: [main, "release-v*"]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)"
        required: false
        default: false

name: build-test-publish

jobs:
  go:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'openshift-pipelines' # do not run this elsewhere
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.25"
      - run: go env
      - name: go build
        run: go build -v ./...
      - uses: alexellis/setup-arkade@v3
      - uses: alexellis/arkade-get@master
        with:
          golangci-lint: latest
      - name: Lint Go Code
        run: |
          golangci-lint --version
          make lint-go
      - name: Run Unit tests
        run: |
          make unit-tests
          
  publish:
    name: publish latest
    runs-on: ubuntu-latest
    needs: [go]

    # https://docs.github.com/en/actions/reference/authentication-in-a-workflow
    permissions: write-all

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.22"
      - id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # 5.9.0
        with:
          images: ghcr.io/${{ github.repository }}/cache
          flavor: |
            latest=${{ github.event_name != 'pull_request' }}
      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # 3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ko-build/setup-ko@v0.9
      - run: |
          ko publish --push=${{ github.event_name != 'pull_request' }} --base-import-paths ./cmd/cache --platform linux/arm64,linux/amd64
